name: Collect SA-MP snapshot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

concurrency:
  group: samp-collector-schedule
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Collect every 1 minute (60x)
        run: |
          for i in $(seq 1 60); do
            echo "Collect attempt $i/60"
            node tools/collect_to_rtdb.js
            if [ "$i" != "60" ]; then
              sleep 60
            fi
          done
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
